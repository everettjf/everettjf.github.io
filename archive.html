---
layout: default
title: Archive
---

<header class="main-header {% if page.cover %}" style="background-image: url({{ page.cover }}) {%else%}no-cover{% endif %}">
    <div class="vertical">
        <div class="main-header-content inner">
            <h1 class="page-title">{{ site.name }}</h1>
            <h2 class="page-description">
                <a href='{{ site.baseurl }}/'> Home </a>;
                <a href='{{ site.baseurl }}/archive'> Archive </a>;
                <a href='https://xnu.app' target="_blank"> Product </a>;
                <a href='https://github.com/everettjf' target="_blank"> GitHub </a>;
                <a href='{{ site.baseurl }}/about'> About </a>;
            </h2>
        </div>
    </div>
</header>
<main id="content" class="content" role="main">

    <article class="post archive-list">
    {% for post in site.posts %}
    <div class="archive-item">
        <span class="archive-date">{{ post.date | date_to_string }}</span>
        <a href="{{ post.url }}" class="archive-link">{{ post.title }}</a>
    </div>
    {% endfor %}
    </article>
</main>
