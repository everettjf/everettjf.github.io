---
layout: default
title: Archive
---

<main>
    <h1 class="page-title">Archive</h1>
    <p class="page-subtitle">All {{ site.posts.size }} posts.</p>

    <ul class="archive-list">
        {% for post in site.posts %}
        <li>
            <a class="archive-title" href="{{ post.url }}">{{ post.title }}</a>
            <time class="archive-date" datetime="{{ post.date | date: "%Y-%m-%d" }}">{{ post.date | date: "%Y-%m-%d" }}</time>
        </li>
        {% endfor %}
    </ul>
</main>
