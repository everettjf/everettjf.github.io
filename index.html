---
layout: default
title: Home
---

<main>
    <h1 class="page-title mono"><span>everettjf</span><span class="cursor">_</span></h1>

    <div class="home-grid">
        <section class="home-col">
            <h2 class="home-label">Blogs</h2>
            <ul class="post-list">
                {% for post in paginator.posts %}
                <li>
                    <a class="post-list-title" href="{{ post.url }}">{{ post.title }}</a>
                    <time class="post-list-date" datetime="{{ post.date | date: "%Y-%m-%d" }}">{{ post.date | date: "%B %-d, %Y" }}</time>
                </li>
                {% endfor %}
            </ul>
            {% include pagination.html %}
        </section>

        <aside class="home-col home-projects">
            <h2 class="home-label">Projects</h2>
            <p class="project-intro">Apps, command-line tools, and open-source by everettjf.</p>
            <a class="project-all" href="/projects/">Browse all projects &rarr;</a>
        </aside>
    </div>
</main>
