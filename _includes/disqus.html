<div id="disqus_thread"></div>
<script>
    var disqus_config = function () {
        this.page.url = '{{ site.url }}{{ site.baseurl }}{{ page.url }}';
        this.page.identifier = '{{ page.url }}';
    };
    (function () {
        var loaded = false;
        function loadDisqus() {
            if (loaded) return;
            loaded = true;
            var d = document, s = d.createElement('script');
            s.src = 'https://everetts-blog.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        }
        var el = document.getElementById('disqus_thread');
        if (el && 'IntersectionObserver' in window) {
            var io = new IntersectionObserver(function (entries) {
                if (entries[0].isIntersecting) { loadDisqus(); io.disconnect(); }
            }, { rootMargin: '400px' });
            io.observe(el);
        } else {
            // Fallback: load on first scroll.
            window.addEventListener('scroll', loadDisqus, { once: true, passive: true });
        }
    })();
</script>
<noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
